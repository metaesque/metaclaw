name: "judge"
description: "The top-level gatekeeper and semantic router. Executes continuous thresholding and multi-category classification to protect frontier token budgets."
routing:
  skill_signature: "Routing, classification, complexity thresholding, intent triage, cost gating, budget optimization."
  negative_keywords: ["write code", "generate an image", "debug this error", "plan a sprint"]
model: "simple-model"
constraints:
  max_tokens: 2048
  temperature: 0.0
tools:
  - name: "forward_to_lite_llm"
    description: "Dispatches the classified payload to the LiteLLM proxy gateway."

name: "relational_sociologist"
description: "The graph engine. Maintains the complex topological mapping of all interpersonal connections, metamours, and network degradation."
system_prompt: |
  You are the Sociologist. Your objective is relational topology mapping.
  You maintain the models of the user's models of other people. You analyze graph databases to identify communication frequency, emotional valence, and historical conflict triggers within a globally distributed network.
routing:
  skill_signature: "Social graph analysis, relational topology, interpersonal relationships, metamours, conflict triggers, communication frequency, Neo4j, Cypher."
  negative_keywords: ["what is my heart rate", "block my calendar", "search the web"]
model: "qwen-3-32b" # High coding logic required to write flawless Cypher/Graph queries on the EVO-X2
constraints:
  max_tokens: 8192
  temperature: 0.1
tools:
  - name: "query_graph_db"
    description: "Executes a Cypher query against the local graph database to traverse relationship nodes."
    script: "scripts/self/query_graph.py"


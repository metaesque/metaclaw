name: "logistics_concierge"
description: "Physical-world logistics and sourcing expert. Handles travel planning, multi-region routing, visa requirements, and hardware sourcing."
system_prompt: |
  You are Hermes, the Logistics Concierge. You manage physical world parameters and logistical sourcing.
  You analyze routes, verify visa constraints across international borders, compare physical accommodation options, and source specialized hardware across different global shipping zones.
routing:
  skill_signature: "Travel logistics, flight routing, accommodation comparisons, visa requirements, passport constraints, hardware sourcing, timezone management."
  negative_keywords: ["write python code", "run a financial model", "read this academic paper"]
model: "gemma4:12b" # Edge routing model on K8 Plus is sufficient for standard DDG physical lookups
constraints:
  max_tokens: 8192
  temperature: 0.2
tools:
  - name: "check_visa_requirements"
    description: "Queries a database of global visa requirements based on passport citizenship."
    script: "scripts/research/check_visas.py"
  - name: "search_web"
    description: "Executes a programmatic search engine query to find local vendor data."
    script: "scripts/research/search_ddg.py"


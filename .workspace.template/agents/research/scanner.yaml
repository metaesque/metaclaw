name: "horizon_scanner"
description: "Ambient technology and research monitor. Continuously polls academic feeds and patent databases for novel breakthroughs."
system_prompt: |
  You are Kepler, the Horizon Scanner. Your objective is ambient monitoring and serendipity generation.
  You filter out SEO spam, sensationalist journalism, and incremental updates, surfacing only paradigm-shifting inventions, mathematical proofs, and scientific breakthroughs.
  When you present a finding, you must rigorously distill its underlying mechanism and its practical implications.
routing:
  skill_signature: "Emergent technologies, novel breakthroughs, serendipity generation, mathematical proofs, academic papers, arXiv, patent monitoring."
  negative_keywords: ["scrape this URL", "find me the price of", "book a flight", "write code"]
model: "llama4-scout-109b" # Highest reasoning capacity required to determine semantic novelty vs. marketing spam
constraints:
  max_tokens: 8192
  temperature: 0.4
tools:
  - name: "poll_rss_feeds"
    description: "Fetches the latest items from a defined list of academic and technology RSS feeds."
    script: "scripts/research/fetch_rss.py"
  - name: "query_arxiv"
    description: "Queries the arXiv API for recent papers matching specific semantic categories."
    script: "scripts/research/fetch_arxiv.py"


name: "security_auditor"
description: "Monitors system health, sanitizes API keys, scans dependencies for vulnerabilities, and analyzes telemetry logs."
system_prompt: |
  You are Gibson, the Security Auditor and Telemetry Analyst. Your mandate is protection and efficiency.
  You scan code for leaked API keys, audit package dependencies for CVEs, and parse JSONL logs to track LLM API token costs and CPU/RAM usage.
routing:
  skill_signature: "Security auditing, API key sanitization, vulnerability scanning, penetration testing, parsing telemetry JSONL logs, resource cost calculation, CVE checking."
  negative_keywords: ["write new feature", "refactor UI", "design logo", "write tests"]
model: "gemma4:12b" # Runs on K8 Plus Gateway. JSON parsing and CVE checking are highly structured, low-logic tasks.
constraints:
  max_tokens: 4096
  temperature: 0.1
tools:
  - name: "scan_vulnerabilities"
    description: "Runs npm audit or pip-audit to check for known CVEs."
    script: "scripts/auditor/scan_deps.py"
  - name: "analyze_costs"
    description: "Parses LiteLLM json logs to aggregate daily API spending."
    script: "scripts/auditor/calc_costs.py"


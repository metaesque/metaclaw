name: "sre_telemetry"
description: "Infrastructure monitor. Analyzes VictoriaLogs, Docker stats, and LLM VRAM utilization across the hardware cluster."
system_prompt: |
  You are the SRE Telemetry Warden. Your objective is hardware stability.
  You monitor the K8 Plus and EVO-X2 clusters, tracking VRAM allocation, detecting memory leaks in local LLM runners, and parsing OpenClaw Gateway logs for runtime errors.
routing:
  skill_signature: "Hardware monitoring, VictoriaLogs, Docker stats, VRAM usage, memory leaks, system stability, log parsing."
  negative_keywords: ["write code", "analyze blood panel", "generate image"]
model: "gemma4:12b" # Edge model on K8 Plus. Log parsing is highly structured and does not require complex reasoning.
constraints:
  max_tokens: 4096
  temperature: 0.1
tools:
  - name: "query_victorialogs"
    description: "Executes a query against the local VictoriaLogs instance to fetch recent telemetry."
    script: "scripts/sre/query_logs.py"
  - name: "check_vram"
    description: "Polls the local AMD/Radeon stats on the EVO-X2 to determine active memory load."
    script: "scripts/sre/check_vram.py"


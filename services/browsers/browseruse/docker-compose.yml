services:
  browseruse:
    # WHAT THIS IS: A REST API wrapper enabling AI-powered browser automation via the Browser Use library.
    # WHY THIS VERSION: Pinned to ${BROWSERUSE_VERSION} (currently 'latest' due to upstream release limitations).
    image: reqeique/browser-use-api:${BROWSERUSE_VERSION}
    container_name: browseruse
    # WHY UNLESS-STOPPED: Automatically restarts the browser manager on unexpected crashes,
    # keeping the agent's web execution pipeline online.
    restart: unless-stopped
    ports:
      # WHAT THIS DOES: Exposes the REST API internally for the agent.
      - "${BROWSERUSE_PORT}:8080"
    environment:
      # WHAT THIS DOES: Redirects all backend LLM traffic generated by the browser navigation
      # logic internally to MetaClaw's unified proxy layer.
      # WHY IT MATTERS: Prevents having to manually inject separate API keys for OpenAI, Anthropic, etc.
      - OPENAI_BASE_URL=http://active-proxy:4000/v1
      - OPENAI_API_KEY=${ACTIVE_PROXY_KEY}
      # Required by the container to start, even if not strictly used for all models
      - BROWSER_USE_API_KEY=optional
    volumes:
      # WHAT THIS DOES: Mounts the persistent browser profile data to the external drive.
      # WHY THIS DEFAULT: Browsing generates massive amounts of cache and cookie data.
      # Anchoring this to the external drive prevents OS disk exhaustion on minimal 16GB RAM machines.
      - ${EXTERNAL_DRIVE_PATH}/browseruse-data:/app/data
    networks:
      openclaw-network:
        # WHAT THIS DOES: Associates the container with a generic internal routing alias.
        # WHY IT MATTERS: OpenClaw connects blindly to 'active-browser', allowing seamless
        # swapping between Skyvern, Hyperbrowser, and Browser Use based on Priority Matrix changes.
        aliases:
          - active-browser
    # WHAT THIS DOES: Probes the API health endpoint directly to verify readiness.
    # WHY THIS DEFAULT: Probes via Python because 'curl' is frequently omitted from minimal docker images.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  openclaw-network:
    name: ${NETWORK_NAME}
    external: true

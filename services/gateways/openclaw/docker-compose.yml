services:
  openclaw-gateway:
    # WHAT THIS IS: This is the core OpenClaw application that coordinates your AI agents.
    # WHY THIS VERSION: We strictly pin to ${OPENCLAW_VERSION} to ensure immutable infrastructure. Floating tags risk unverified, breaking updates.
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_VERSION}
    container_name: openclaw-gateway
    # Parameterized user to support both DooD (root) and strictly isolated
    # (node) sandbox paradigms.
    user: ${OPENCLAW_USER:-node}
    # WHY UNLESS-STOPPED: Provides basic resilience.
    # If the Docker daemon restarts or the process crashes, the orchestrator handles recovery.
    restart: unless-stopped
    ports:
      # WHAT THIS DOES: Binds the internal port 18789 to your host machine's specified port.
      # UPGRADE PATH: For remote VPS deployments, bind this to "127.0.0.1:${OPENCLAW_PORT}:18789" and place an SSL-terminating reverse proxy (like Nginx) in front of it.
      - "${OPENCLAW_PORT}:18789"
    volumes:
      # WHAT THIS DOES:
      #   Segregates ephemeral container data from persistent state.
      # WHY THIS DEFAULT:
      #   A local bind mount provides immediate accessibility to configuration
      #   files for debugging.
      - ./config:${OPENCLAW_INTERNAL_HOME:-/home/node}/.openclaw
      # WHAT THIS DOES:
      #   Mounts the agent workspace sandbox so agents can read/write files
      #   without accessing your entire hard drive.
      - ${OPENCLAW_WORKSPACE}:${OPENCLAW_INTERNAL_HOME:-/home/node}/.openclaw/workspace
      # WHAT THIS DOES:
      #   Mounts the host's Docker socket and the dynamically downloaded static
      #   Docker CLI.
      # WHY THIS DEFAULT:
      #   OpenClaw executes tools by spinning up sibling Docker containers. To
      #   do this from inside a container (Docker-out-of-Docker), it requires
      #   the socket and the client executable.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bin/docker:/usr/bin/docker:ro
    env_file:
      - .env
      - ../../proxy/.env
    environment:
      # WHAT THIS DOES: Redirects standard OpenAI SDK calls locally to our API proxy.
      # ARCHITECTURAL SHIFT: We now point to the agnostic 'active-proxy' alias instead
      # of the hardcoded 'litellm-proxy' container name.
      - OPENAI_BASE_URL=http://active-proxy:4000/v1
      # ARCHITECTURAL SHIFT: Consume the generic proxy key interface.
      - OPENAI_API_KEY=${ACTIVE_PROXY_KEY}
      # WHAT THIS DOES: Explicitly tells OpenClaw to load our custom predictive scoring hooks.
      # WHY IT MATTERS: Version 2026.4.5 requires an explicit path to a JS config file for hooks as legacy internal hook paths were removed.
      - OPENCLAW_CONFIG_FILE=${OPENCLAW_INTERNAL_HOME:-/home/node}/.openclaw/openclaw.config.js
    networks:
      - openclaw-net
    # WHAT THIS DOES: Actively probes the application layer, not just the container runtime.
    # WHY IT MATTERS: The container is marked "running" the millisecond Node.js starts, but the API isn't ready.
    # This ensures dependent services wait.
    healthcheck:
      # We use wget because 'nc' (netcat) is not installed in the stripped-down OpenClaw image.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:18789 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  openclaw-net:
    # WHAT THIS DOES: Bridges the gateway to the globally defined network array.
    name: ${NETWORK_NAME}
    external: true

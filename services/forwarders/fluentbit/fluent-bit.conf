# ==============================================================================
# FLUENT BIT PIPELINE CONFIGURATION - EDGE FORWARDER
# ==============================================================================

[SERVICE]
    Flush        1
    Log_Level    error
    Parsers_File parsers.conf

# ------------------------------------------------------------------------------
# INGESTION LAYER (INPUTS)
# ------------------------------------------------------------------------------

# 1. Core Docker Container Ingestion Loop
[INPUT]
    Name             tail
    Path             /var/lib/docker/containers/*/*.log
    Parser           docker
    Tag              docker.*
    Refresh_Interval 5
    Read_from_Head   false

# 2. Bare-Metal Ollama Runner Log Ingestion
[INPUT]
    Name             tail
    Path             /metaclaw/services/runners/ollama/ollama.log
    Tag              baremetal.ollama
    Refresh_Interval 2
    Read_from_Head   false

# ------------------------------------------------------------------------------
# TRANSFORMATION LAYER (FILTERS)
# ------------------------------------------------------------------------------

# WHAT THIS DOES: Appends the host's Tailscale IP to every single log entry processed on this node.
[FILTER]
    Name record_modifier
    Match *
    Record host ${HOST_IDENTIFIER}

# ------------------------------------------------------------------------------
# ROUTING & RECONCILIATION LAYER (OUTPUTS)
# ------------------------------------------------------------------------------

[OUTPUT]
    Name  http
    Match *
    Host  ${ACTIVE_LOGGER_HOST}
    Port  9428
    # WHAT THIS DOES: Formats the data stream for VictoriaLogs' ingestion API.
    # WHY THIS DEFAULT: We explicitly pass '_stream_fields=host,stream,container_id' so VictoriaLogs
    # natively partitions the database tables by the injected host origin, ensuring fast cross-cluster queries.
    URI   /insert/jsonline?_stream_fields=host,stream,container_id&_msg_field=log&_time_field=time
    Format json_lines

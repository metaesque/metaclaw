# ==============================================================================
# FLUENT BIT PIPELINE CONFIGURATION - UNIFIED MESH CONFIG
# ==============================================================================

[SERVICE]
    Flush        1
    Log_Level    error
    Parsers_File parsers.conf

# ------------------------------------------------------------------------------
# INGESTION LAYER (INPUTS)
# ------------------------------------------------------------------------------

# 1. Core Docker Container Ingestion Loop
[INPUT]
    Name             tail
    Path             /var/lib/docker/containers/*/*.log
    Parser           docker
    Tag              docker.*
    Refresh_Interval 5
    Read_from_Head   false

# 2. Bare-Metal Ollama Runner Log Ingestion
[INPUT]
    Name             tail
    Path             /home/metaclaw/repo/services/runners/ollama/ollama.log
    Tag              ollama.baremetal
    Refresh_Interval 2
    Read_from_Head   false

# 3. Relational Memory PostgreSQL Log Ingestion
[INPUT]
    Name             tail
    Path             /home/metaclaw/external/metaclaw/openclaw-postgres-data/log/*.log
    Tag              postgres.baremetal
    Refresh_Interval 5
    Read_from_Head   false

# ------------------------------------------------------------------------------
# ROUTING & RECONCILIATION LAYER (OUTPUTS)
# ------------------------------------------------------------------------------
[OUTPUT]
    Name  http
    Match *
    Host  active-logger
    Port  9428
    URI   /insert/jsonline?_stream_fields=stream,container_id,job&_msg_field=log&_time_field=time
    Format json_lines

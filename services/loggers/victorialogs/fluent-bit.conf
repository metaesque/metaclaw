# ==============================================================================
# FLUENT BIT PIPELINE CONFIGURATION
# ==============================================================================

[SERVICE]
    Flush        1
    Log_Level    info
    # Use the built-in parser definitions provided by the official Docker image
    Parsers_File parsers.conf

# ------------------------------------------------------------------------------
# INGESTION (INPUT)
# ------------------------------------------------------------------------------
[INPUT]
    Name             tail
    # Tail all log files generated by the local Docker daemon
    Path             /var/lib/docker/containers/*/*.log
    Parser           docker
    Tag              docker.*
    Refresh_Interval 5
    # Ensures we don't re-ingest the entire history of logs on restart
    Read_from_Head   false

# ------------------------------------------------------------------------------
# ROUTING (OUTPUT)
# ------------------------------------------------------------------------------
[OUTPUT]
    Name  http
    Match docker.*
    # Route traffic using the abstracted network alias defined in docker-compose.yml
    Host  active-logger
    Port  9428
    # WHAT THIS DOES: Formats the data stream for VictoriaLogs' ingestion API.
    # WHY THIS DEFAULT: We explicitly map the stream fields so that in the UI,
    # you can filter logs by 'stream' (stdout/stderr) or the raw 'container_id'.
    URI   /insert/jsonline?_stream_fields=stream,container_id&_msg_field=log&_time_field=time
    Format json_lines

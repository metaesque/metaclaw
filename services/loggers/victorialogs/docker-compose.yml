services:
  victorialogs:
    # WHAT THIS IS: A high-performance, ultra-lightweight full-text search database for logs.
    # WHY THIS TOOL: It uses 30x less RAM than Elasticsearch/Loki, preserving memory for your local LLM inference models (like Ollama).
    image: victoriametrics/victoria-logs:${VICTORIALOGS_VERSION}
    container_name: victorialogs
    restart: unless-stopped
    ports:
      # WHAT THIS DOES: Exposes the HTTP API and built-in UI for searching logs.
      # UPGRADE PATH: On a public VPS, restrict this to 127.0.0.1 and use a reverse proxy with Basic Auth.
      - "${VICTORIALOGS_PORT}:9428"
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=${VICTORIALOGS_RETENTION}"
      - "-defaultMsgValue=empty"
    volumes:
      # WHAT THIS DOES: Persists the highly compressed columnar log files.
      # WHY THIS DEFAULT: Routes data to your external drive to prevent OS disk exhaustion.
      - ${EXTERNAL_DRIVE_PATH}/victorialogs-data:/victoria-logs-data
    networks:
      shared-network:
        # WHAT THIS DOES: Establishes a generic internal DNS alias.
        # WHY IT MATTERS: Downstream tools (like Fluent Bit) connect to 'active-logger' rather than a hardcoded container name, allowing easy swapping of logging backends.
        aliases:
          - active-logger

  fluent-bit:
    # WHAT THIS IS: A lightweight C-based log processor and forwarder.
    # WHY THIS TOOL: It tails the raw Docker JSON logs generated by all MetaClaw containers and streams them into VictoriaLogs seamlessly with zero host OS configuration.
    image: fluent/fluent-bit:${FLUENTBIT_VERSION}
    container_name: fluent-bit
    restart: unless-stopped
    # Waits for VictoriaLogs to be ready before starting to stream logs
    depends_on:
      - victorialogs
    volumes:
      # WHAT THIS DOES: Mounts our custom routing configuration.
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      # WHAT THIS DOES: Mounts the host Docker container logs path.
      # WHY THIS DEFAULT: By mounting this path read-only, Fluent Bit can passively collect logs from ALL containers without requiring you to change their Docker logging drivers.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - shared-network

networks:
  shared-network:
    name: ${NETWORK_NAME}
    external: true
